name: vibration
services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - init-scripts:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password 
    networks:
      - vibration-network

  redis:                         
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - vibration-network

# For search engine
  typesense:
    image: typesense/typesense:26.0 
    container_name: typesense_search
    restart: on-failure
    ports:
      - "8108:8108"
    volumes:
      - ./typesense-data:/data 
    command: '--data-dir /data --api-key=SuperSecretKey123 --enable-cors=true'
    networks:
      - vibration-network

